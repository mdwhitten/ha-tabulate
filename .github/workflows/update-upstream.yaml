name: Update Upstream Tabulate

on:
  repository_dispatch:
    types: [upstream-release]
  workflow_dispatch: # Allow manual trigger

jobs:
  check-and-update:
    name: Check for new upstream release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Get current pinned version
        id: current
        run: |
          version=$(grep 'ARG TABULATE_VERSION=' tabulate/Dockerfile | sed 's/.*TABULATE_VERSION=//')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Get latest upstream release
        id: upstream
        run: |
          # Use the tag from repository_dispatch payload if available, otherwise query
          if [ -n "${{ github.event.client_payload.tag }}" ]; then
            tag="${{ github.event.client_payload.tag }}"
          else
            tag=$(gh release view --repo mdwhitten/tabulate --json tagName -q .tagName)
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compare versions
        id: check
        run: |
          if [ "${{ steps.current.outputs.version }}" = "${{ steps.upstream.outputs.tag }}" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date (${{ steps.current.outputs.version }})"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Update available: ${{ steps.current.outputs.version }} → ${{ steps.upstream.outputs.tag }}"
          fi

      - name: Compute new add-on version
        if: steps.check.outputs.needed == 'true'
        id: addon
        run: |
          # Parse old and new upstream versions to determine bump type
          old_upstream="${{ steps.current.outputs.version }}"
          new_upstream="${{ steps.upstream.outputs.tag }}"
          old_upstream="${old_upstream#v}"
          new_upstream="${new_upstream#v}"

          IFS='.' read -r old_major old_minor _old_patch <<< "$old_upstream"
          IFS='.' read -r new_major new_minor _new_patch <<< "$new_upstream"

          if [ "$new_major" -gt "$old_major" ]; then
            bump="major"
          elif [ "$new_minor" -gt "$old_minor" ]; then
            bump="minor"
          else
            bump="patch"
          fi
          echo "Upstream bump type: $bump ($old_upstream → $new_upstream)"

          # Apply the same bump type to the add-on version
          current=$(grep '^version:' tabulate/config.yaml | sed 's/version: *"\(.*\)"/\1/')
          IFS='.' read -r major minor patch <<< "$current"

          case "$bump" in
            major) new_version="$((major + 1)).0.0" ;;
            minor) new_version="${major}.$((minor + 1)).0" ;;
            patch) new_version="${major}.${minor}.$((patch + 1))" ;;
          esac

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new_version" >> "$GITHUB_OUTPUT"
          echo "Add-on version: $current → $new_version"

      - name: Fetch upstream changelog
        if: steps.check.outputs.needed == 'true'
        id: changelog
        run: |
          upstream_tag="${{ steps.upstream.outputs.tag }}"
          upstream_version="${upstream_tag#v}"

          # Fetch the raw CHANGELOG.md from the upstream repo at the new tag
          gh api "repos/mdwhitten/tabulate/contents/CHANGELOG.md?ref=${upstream_tag}" \
            --jq '.content' | base64 -d > /tmp/upstream_changelog.md

          # Extract the section for the new version (between its heading and the next ## heading)
          awk -v ver="$upstream_version" '
            /^## \[/ {
              if (found) exit
              if (index($0, ver)) { found=1; next }
            }
            found && /^###/ { print }
            found && /^- / { print }
            found && /^$/ { print }
          ' /tmp/upstream_changelog.md > /tmp/section.md

          # Build the new CHANGELOG entry
          {
            echo "## ${{ steps.addon.outputs.new }}"
            echo ""
            cat /tmp/section.md
            # Append the upgrade note under Changed, creating the heading if needed
            if ! grep -q '^### Changed' /tmp/section.md; then
              echo "### Changed"
            fi
            echo "- Upgraded upstream Tabulate from ${{ steps.current.outputs.version }} to ${upstream_tag}"
            echo ""
          } > /tmp/new_entry.md

          # Store for later steps
          cat /tmp/new_entry.md
          {
            echo "entry<<CHANGELOG_EOF"
            cat /tmp/new_entry.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Dockerfile
        if: steps.check.outputs.needed == 'true'
        run: |
          sed -i "s/ARG TABULATE_VERSION=.*/ARG TABULATE_VERSION=${{ steps.upstream.outputs.tag }}/" \
            tabulate/Dockerfile

      - name: Update config.yaml version
        if: steps.check.outputs.needed == 'true'
        run: |
          sed -i "s/^version: .*/version: \"${{ steps.addon.outputs.new }}\"/" \
            tabulate/config.yaml

      - name: Update CHANGELOG.md
        if: steps.check.outputs.needed == 'true'
        run: |
          # Insert new entry after the "# Changelog" header
          {
            head -1 tabulate/CHANGELOG.md
            echo ""
            echo "${{ steps.changelog.outputs.entry }}"
            tail -n +2 tabulate/CHANGELOG.md
          } > /tmp/changelog_new.md
          mv /tmp/changelog_new.md tabulate/CHANGELOG.md

      - name: Create pull request
        if: steps.check.outputs.needed == 'true'
        run: |
          branch="auto/update-tabulate-${{ steps.upstream.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add tabulate/Dockerfile tabulate/config.yaml tabulate/CHANGELOG.md
          git commit -m "Bump upstream Tabulate to ${{ steps.upstream.outputs.tag }}"
          git push -u origin "$branch"

          gh pr create \
            --title "v${{ steps.addon.outputs.new }}" \
            --body "$(cat <<EOF
          ## Summary
          - Upgrades upstream Tabulate from \`${{ steps.current.outputs.version }}\` to \`${{ steps.upstream.outputs.tag }}\`
          - Bumps add-on version from \`${{ steps.addon.outputs.current }}\` to \`${{ steps.addon.outputs.new }}\`

          ## Changes from upstream
          ${{ steps.changelog.outputs.entry }}

          ---
          *Automatically generated by the update-upstream workflow.*
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
