worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    sendfile on;
    tcp_nopush on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Needed for sub_filter to work with gzipped upstream responses
    # (not applicable here since we serve static files, but good practice)

    upstream backend {
        server 127.0.0.1:8000;
    }

    map $http_x_ingress_path $base_href {
        default "/";
        "~^(.+)$" "$1/";
    }

    server {
        listen 8099 default_server;

        # API — proxy to FastAPI
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Ingress-Path $http_x_ingress_path;
            proxy_read_timeout 120s;
            client_max_body_size 20M;
        }

        # Static frontend assets
        location /assets/ {
            alias /app/frontend/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback — serve index.html for all non-API routes
        # Inject <base href> dynamically based on X-Ingress-Path header
        location / {
            root /app/frontend;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Rewrite the <head> tag to inject a <base href> for ingress support
            sub_filter '</head>' '<base href="$base_href"></head>';
            sub_filter_once on;
            sub_filter_types text/html;
        }
    }
}
