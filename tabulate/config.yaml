name: Tabulate
version: "1.2.0"
slug: tabulate
description: Grocery receipt tracker with OCR + AI categorization
url: https://github.com/mdwhitten/ha-tabulate
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
ingress_entry: /
panel_icon: mdi:receipt-text
panel_title: Tabulate
map:
  - addon_config:rw
options:
  anthropic_api_key: ""
  verbose_logging: false
schema:
  anthropic_api_key: password
  verbose_logging: bool
image: ghcr.io/mdwhitten/ha-tabulate-{arch}
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Web interface (ingress handles this automatically)
