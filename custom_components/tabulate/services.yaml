add_receipt:
  name: Add receipt
  description: >-
    Upload a scanned receipt image to the Tabulate add-on for OCR + AI
    extraction and categorization.
  fields:
    image_base64:
      name: Image (base64)
      description: >-
        The receipt image, base64-encoded. Accepts JPEG, PNG, WEBP, TIFF, HEIC,
        or PDF up to 20 MB. A data: URI prefix is tolerated.
      required: true
      example: "/9j/4AAQSkZJRgABAQAAAQ..."
      selector:
        text:
          multiline: true
    filename:
      name: File name
      description: File name to send with the upload.
      required: false
      example: receipt.jpg
      default: receipt.jpg
      selector:
        text:
    content_type:
      name: Content type
      description: MIME type of the image.
      required: false
      example: image/jpeg
      default: image/jpeg
      selector:
        text:
    store_name_hint:
      name: Store name hint
      description: Optional hint to help identify the store on the receipt.
      required: false
      example: Trader Joe's
      selector:
        text:
    wait_for_processing:
      name: Wait for processing
      description: >-
        When on, the action holds the request open until Tabulate finishes
        (seconds to ~120s) and returns the parsed receipt. Turn this off from
        callers with a short timeout (e.g. Apple Shortcuts) to return
        immediately and process the receipt in the background.
      required: false
      default: true
      selector:
        boolean:
